<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-label="Emblems Archive banner for X">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="0.5" stop-color="#eaf6ff"/>
      <stop offset="1" stop-color="#e0f2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#d9ecff"/>
      <stop offset="1" stop-color="#cfe9ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b" />
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)" />

  <!-- Soft overlapping shapes for texture (no logo) -->
  <g opacity="0.95">
    <ellipse cx="420" cy="260" rx="360" ry="140" fill="url(#accent)" transform="rotate(-12 420 260)" filter="url(#soft)"/>
    <ellipse cx="1050" cy="180" rx="300" ry="110" fill="#eef9ff" transform="rotate(8 1050 180)"/>
    <circle cx="1250" cy="380" r="48" fill="#dff2ff" opacity="0.8"/>
    <circle cx="1400" cy="90" r="32" fill="#eaf6ff" opacity="0.75"/>
  </g>

  <!-- Subtle diagonal grid lines -->
  <g stroke="#d9ecff" stroke-width="1" opacity="0.35">
    <path d="M0 420 L1500 20"/>
    <path d="M-80 480 L1420 80"/>
    <path d="M80 480 L1580 80"/>
  </g>

  <!-- Centered Title -->
  <g transform="translate(220,160)">
    <text x="0" y="0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#0f2436">Emblems Archive</text>
    <text x="0" y="62" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#526070">Protective symbols — emblems.wiki</text>
  </g>

  <!-- Decorative motif under title -->
  <g transform="translate(220,240)" fill="none" stroke="#bfe1ff" stroke-width="3" opacity="0.9">
    <path d="M0 22 C 40 4 140 4 220 22" stroke-linecap="round"/>
    <path d="M260 22 C 300 4 400 4 480 22" stroke-linecap="round"/>
  </g>

  <!-- Small caption bottom-left -->
  <text x="40" y="480" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#7a8a99">For official X profile only — emblems.wiki</text>
</svg>
